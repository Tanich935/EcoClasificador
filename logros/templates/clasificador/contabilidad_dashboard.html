<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contabilidad - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-900 to-emerald-950 min-h-screen text-white">

<div class="container mx-auto px-6 py-12">
    <h1 class="text-5xl font-bold text-center mb-12">📊 Módulo de Contabilidad</h1>

    <div class="grid grid-cols-3 gap-8 max-w-5xl mx-auto">
        <div class="bg-emerald-900/30 p-8 rounded-3xl text-center">
            <p class="text-emerald-400 text-xl">Total Ingresos</p>
            <p class="text-5xl font-bold mt-4">Bs {{ total_ingresos }}</p>
        </div>
        <div class="bg-red-900/30 p-8 rounded-3xl text-center">
            <p class="text-red-400 text-xl">Total Egresos</p>
            <p class="text-5xl font-bold mt-4">Bs {{ total_egresos }}</p>
        </div>
        <div class="bg-blue-900/30 p-8 rounded-3xl text-center border-2 border-blue-400">
            <p class="text-blue-400 text-xl">Balance Neto</p>
            <p class="text-5xl font-bold mt-4">Bs {{ balance }}</p>
        </div>
    </div>

    <div class="text-center mt-12 space-x-6">
        <a href="{% url 'home' %}" class="bg-white text-black px-8 py-4 rounded-2xl font-bold">Clasificar Residuo</a>
        <a href="{% url 'registrar_egreso' %}" class="bg-red-600 hover:bg-red-700 px-8 py-4 rounded-2xl font-bold">Registrar Egreso</a>
    </div>
</div>

</body>
</html>
