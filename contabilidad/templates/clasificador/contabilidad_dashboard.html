<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contabilidad - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-900 to-emerald-950 min-h-screen text-white">

<div class="container mx-auto px-6 py-12">
    <h1 class="text-5xl font-bold text-center mb-12">📊 Módulo de Contabilidad</h1>

    <div class="grid grid-cols-3 gap-8 max-w-5xl mx-auto">
        <div class="bg-emerald-900/30 p-8 rounded-3xl text-center">
            <p class="text-emerald-400 text-xl">Total Ingresos</p>
            <p class="text-5xl font-bold mt-4">Bs {{ total_ingresos }}</p>
        </div>
        <div class="bg-red-900/30 p-8 rounded-3xl text-center">
            <p class="text-red-400 text-xl">Total Egresos</p>
            <p class="text-5xl font-bold mt-4">Bs {{ total_egresos }}</p>
        </div>
        <div class="bg-blue-900/30 p-8 rounded-3xl text-center border-2 border-blue-400">
            <p class="text-blue-400 text-xl">Balance Neto</p>
            <p class="text-5xl font-bold mt-4">Bs {{ balance }}</p>
        </div>
    </div>

    <div class="text-center mt-12 space-x-6">
        <a href="{% url 'home' %}" class="bg-white text-black px-8 py-4 rounded-2xl font-bold">Clasificar Residuo</a>
        <a href="{% url 'registrar_egreso' %}" class="bg-red-600 hover:bg-red-700 px-8 py-4 rounded-2xl font-bold">Registrar Egreso</a>
    </div>
</div>

<div style="position: fixed; bottom: 30px; left: 30px; z-index: 9999;">
        <a href="javascript:void(0)" id="btn-accesibilidad" style="background-color: rgba(30, 41, 59, 0.9); border: 2px solid #10b981; color: #10b981; padding: 12px 20px; border-radius: 12px; text-decoration: none; font-weight: bold; font-family: sans-serif; transition: all 0.3s ease; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            <i class="fas fa-universal-access text-xl"></i>
            <span>Modo Accesibilidad (F + J)</span>
        </a>
    </div>

    <script>
        let teclasActivasGlobal = {};
        // Memoria del navegador
        let intencionMicrofonoGlobal = sessionStorage.getItem('microfonoInmortal') === 'true';
        let reconocimientoGlobal;
        let esperandoInteraccion = false;
        
        const btnAccesibilidadGlobal = document.getElementById('btn-accesibilidad');
        const contenidoOriginalBotonGlobal = btnAccesibilidadGlobal.innerHTML;

        const SpeechRecognitionGlobal = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognitionGlobal) {
            reconocimientoGlobal = new SpeechRecognitionGlobal();
            reconocimientoGlobal.lang = 'es-ES'; 
            reconocimientoGlobal.continuous = true; 
            
            reconocimientoGlobal.onstart = function() {
                esperandoInteraccion = false;
                btnAccesibilidadGlobal.style.backgroundColor = "rgba(220, 38, 38, 0.9)";
                btnAccesibilidadGlobal.style.borderColor = "#ef4444";
                btnAccesibilidadGlobal.style.color = "#ffffff";
                btnAccesibilidadGlobal.innerHTML = '<i class="fas fa-microphone text-xl animate-pulse"></i><span> Escuchando...</span>';
            };

            reconocimientoGlobal.onresult = function(event) {
                const ultimoIndice = event.results.length - 1;
                const comando = event.results[ultimoIndice][0].transcript.toLowerCase().trim();
                console.log("Comando escuchado: ", comando);
                
                btnAccesibilidadGlobal.innerHTML = `<i class="fas fa-comment-dots text-xl"></i><span> Escuchó: "${comando}"</span>`;
                let comandoValido = true;

                if (comando.includes("clasificar") || comando.includes("ayuda") || comando.includes("cámara")) {
                    window.location.href = "/ayuda-externa/";
                } else if (comando.includes("inicio") || comando.includes("principal") || comando.includes("home")) {
                    window.location.href = "/";
                } else if (comando.includes("contabilidad") || comando.includes("finanzas") || comando.includes("dinero")) {
                    window.location.href = "/contabilidad/";
                } else if (comando.includes("logro") || comando.includes("trofeo") || comando.includes("recompensa")) {
                    window.location.href = "/logros/";
                } else if (comando.includes("panel") || comando.includes("control") || comando.includes("administración") || comando.includes("admin")) {
                    window.location.href = "/panel_admin/";
                } else if (comando.includes("cerrar sesión") || comando.includes("salir") || comando.includes("desconectar")) {
                    window.location.href = "/logout_custom/"; 
                } else {
                    comandoValido = false;
                    setTimeout(() => {
                        if(intencionMicrofonoGlobal && !esperandoInteraccion) {
                            btnAccesibilidadGlobal.innerHTML = '<i class="fas fa-microphone text-xl animate-pulse"></i><span> Escuchando...</span>';
                        }
                    }, 2000);
                }
            };

            // SI CHROME LO BLOQUEA, ENTRA AQUÍ
            reconocimientoGlobal.onerror = function(event) {
                if (event.error === 'not-allowed') {
                    console.warn("Chrome bloqueó el auto-inicio por seguridad. Requiere un clic.");
                    esperandoInteraccion = true;
                    // Ponemos el botón en color Naranja
                    btnAccesibilidadGlobal.style.backgroundColor = "#f59e0b"; 
                    btnAccesibilidadGlobal.style.borderColor = "#f59e0b";
                    btnAccesibilidadGlobal.style.color = "#ffffff";
                    btnAccesibilidadGlobal.innerHTML = '<i class="fas fa-hand-pointer animate-bounce"></i><span> Clic en pantalla para reanudar</span>';
                }
            };

            reconocimientoGlobal.onend = function() {
                if (intencionMicrofonoGlobal && !esperandoInteraccion) {
                    try { reconocimientoGlobal.start(); } catch(e) {}
                } else if (!intencionMicrofonoGlobal) {
                    btnAccesibilidadGlobal.style.backgroundColor = "rgba(30, 41, 59, 0.9)";
                    btnAccesibilidadGlobal.style.borderColor = "#10b981";
                    btnAccesibilidadGlobal.style.color = "#10b981";
                    btnAccesibilidadGlobal.innerHTML = contenidoOriginalBotonGlobal;
                }
            };
        }

        // 1. AUTO-ARRANQUE AL CARGAR PÁGINA NUEVA
        window.addEventListener('load', () => {
            if (intencionMicrofonoGlobal && reconocimientoGlobal) {
                try { reconocimientoGlobal.start(); } catch(e) {}
            }
        });

        // 2. DESPERTADOR CON CUALQUIER CLIC (Evade el bloqueo)
        document.addEventListener('click', () => {
            if (esperandoInteraccion && intencionMicrofonoGlobal) {
                try { reconocimientoGlobal.start(); } catch(e) {}
            }
        });

        // 3. DESPERTADOR CON CUALQUIER TECLA
        document.addEventListener('keydown', (event) => {
            // Ignoramos la F y la J para que no se cruce con el apagado manual
            if (event.key.toLowerCase() !== 'f' && event.key.toLowerCase() !== 'j') {
                if (esperandoInteraccion && intencionMicrofonoGlobal) {
                    try { reconocimientoGlobal.start(); } catch(e) {}
                }
            }
        });

        // 4. CONTROL MANUAL F+J
        document.addEventListener('keydown', function(event) {
            if (event.repeat) return; 
            if (event.target.tagName.toLowerCase() === 'input' || event.target.tagName.toLowerCase() === 'textarea') return;
            
            teclasActivasGlobal[event.key.toLowerCase()] = true;

            if (teclasActivasGlobal['f'] && teclasActivasGlobal['j']) {
                event.preventDefault(); 
                
                if (!intencionMicrofonoGlobal) {
                    intencionMicrofonoGlobal = true;
                    sessionStorage.setItem('microfonoInmortal', 'true');
                    try { reconocimientoGlobal.start(); } catch(e) {}
                } else {
                    intencionMicrofonoGlobal = false;
                    esperandoInteraccion = false;
                    sessionStorage.setItem('microfonoInmortal', 'false');
                    reconocimientoGlobal.stop();
                }
            }
        });

        document.addEventListener('keyup', function(event) {
            teclasActivasGlobal[event.key.toLowerCase()] = false;
        });
    </script>

</body>
</html>
