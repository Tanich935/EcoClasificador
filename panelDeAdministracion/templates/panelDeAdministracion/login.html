<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Iniciar Sesión | EcoClasificador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);">

    <div class="max-w-md w-full bg-slate-800/80 backdrop-blur-xl border border-slate-600 rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-500/20 text-emerald-400 mb-4">
                    <i class="fas fa-shield-alt text-3xl"></i>
                </div>
                <h2 class="text-3xl font-bold text-white">Acceso Restringido</h2>
                <p class="text-gray-400 mt-2">Ingresa tus credenciales para continuar</p>
            </div>

            {% if form.errors %}
            <div class="bg-red-500/10 border border-red-500 text-red-400 p-3 rounded-xl mb-6 text-center text-sm font-medium">
                ❌ Usuario o contraseña incorrectos.
            </div>
            {% endif %}

            <form method="POST" action="">
                {% csrf_token %}
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Usuario</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-user text-gray-500"></i>
                            </div>
                            <input type="text" name="username" required 
                                   class="block w-full pl-10 pr-3 py-3 border border-slate-600 rounded-xl bg-slate-900/50 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Contraseña</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-500"></i>
                            </div>
                            <input type="password" name="password" required 
                                   class="block w-full pl-10 pr-3 py-3 border border-slate-600 rounded-xl bg-slate-900/50 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors">
                        </div>
                    </div>
                </div>

                <button type="submit" 
                        class="w-full mt-8 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-emerald-500/30 transition-all flex justify-center items-center gap-2">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
                
                <input type="hidden" name="next" value="{{ next }}">
            </form>
        </div>
        <div class="bg-slate-900/50 px-8 py-4 text-center border-t border-slate-700">
            <a href="/" class="text-sm text-emerald-400 hover:text-emerald-300 transition-colors">
                <i class="fas fa-arrow-left mr-1"></i> Volver al inicio
            </a>
        </div>
    </div>

</body>
</html>
